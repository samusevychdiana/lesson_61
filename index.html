<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <h2>Налаштування акаунту</h2>

        <!-- РАДІО -->
        <div class="section">
            <span class="label-title">ТЕМА ІНТЕРФЕЙСУ</span>

            <label class="option">
                <input type="radio" name="theme" checked>
                <span class="radio-custom"></span>
                Світла
            </label>

            <label class="option">
                <input type="radio" name="theme">
                <span class="radio-custom"></span>
                Темна
            </label>
        </div>

        <!-- ЧЕКБОКСИ -->
        <div class="section">
            <span class="label-title">EMAIL СПОВІЩЕННЯ</span>

            <label class="option">
                <input type="checkbox" checked>
                <span class="checkbox-custom"></span>
                Нові повідомлення в чаті
            </label>

            <label class="option">
                <input type="checkbox">
                <span class="checkbox-custom"></span>
                Щотижневий звіт успішності
            </label>
        </div>

        <button>Зберегти налаштування</button>
    </div>

</body>

</html>
